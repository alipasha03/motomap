<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOTOMAP Harita Kaniti</title>
    <style>
      :root {
        --ink: #22303c;
        --paper: #f6f1e8;
        --panel: rgba(255, 251, 244, 0.94);
        --line: rgba(34, 48, 60, 0.14);
        --muted: #6d6258;
        --pass: #1f7a62;
        --fail: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #ffe8d6 0, transparent 30%),
          linear-gradient(135deg, #f4eee2 0%, #e8ddcd 100%);
      }

      #app {
        display: grid;
        grid-template-columns: 430px 1fr;
        min-height: 100vh;
      }

      aside {
        padding: 24px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        border-right: 1px solid var(--line);
        overflow-y: auto;
      }

      .eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--muted);
      }

      h1 {
        margin: 8px 0 10px;
        font-size: 34px;
        line-height: 1;
      }

      .lede {
        margin: 0 0 16px;
        font-size: 15px;
        line-height: 1.5;
        color: #584f46;
      }

      .summary {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 18px;
      }

      .panel {
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.58);
      }

      .section-title {
        margin: 20px 0 10px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .legend-list,
      .case-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.52);
        font-size: 13px;
      }

      .legend-swatch {
        width: 28px;
        height: 6px;
        border-radius: 999px;
        display: inline-block;
      }

      .legend-swatch.dashed {
        background:
          repeating-linear-gradient(
            to right,
            var(--legend-color) 0 8px,
            transparent 8px 12px
          );
      }

      .case-card {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.62);
      }

      .case-card-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .case-kicker {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .case-card h3 {
        margin: 4px 0;
        font-size: 20px;
      }

      .case-card p {
        margin: 0;
        color: #5d534a;
        font-size: 13px;
      }

      .case-badge {
        align-self: flex-start;
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .case-badge.pass {
        background: rgba(31, 122, 98, 0.12);
        color: var(--pass);
      }

      .case-badge.fail {
        background: rgba(180, 35, 24, 0.12);
        color: var(--fail);
      }

      .case-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      .metric,
      .mode-row-card,
      .checks {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.54);
      }

      .metric {
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .metric span,
      .mode-row-card span,
      .checks {
        font-size: 12px;
        color: #60564d;
      }

      .metric strong {
        font-size: 18px;
      }

      .metric em {
        font-style: normal;
        font-size: 12px;
        color: #7b6f64;
      }

      .mode-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
      }

      .mode-row-card {
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .mode-row-card strong {
        font-size: 14px;
      }

      .checks {
        margin-top: 12px;
        padding: 10px 12px;
        line-height: 1.55;
      }

      #map-wrap {
        position: relative;
      }

      #map {
        width: 100%;
        height: 100vh;
      }

      #loading {
        position: absolute;
        top: 24px;
        right: 24px;
        z-index: 2;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      }

      @media (max-width: 980px) {
        #app {
          grid-template-columns: 1fr;
        }

        aside {
          order: 2;
        }

        #map {
          height: 58vh;
          min-height: 58vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside>
        <div class="eyebrow">MotoMap Proof Deck</div>
        <h1>3 Google rota + 9 MOTOMAP rota ayni haritada</h1>
        <p class="lede">
          Buton yok. Harita tek ekranda tum test vakalarini gosterir. Her rota
          harita ustunde label alir: Google cizgileri `G1-G3`, MOTOMAP cizgileri
          `1-S`, `1-V`, `1-Gv` gibi isaretlenir.
        </p>

        <div class="summary">
          <div class="panel" id="suite-summary">—</div>
          <div class="panel" id="suite-proof">—</div>
        </div>

        <div class="section-title">Harita Lejandi</div>
        <div class="legend-list" id="legend-list"></div>

        <div class="section-title">Vaka Ozeti</div>
        <div class="case-list" id="case-list"></div>
      </aside>

      <main id="map-wrap">
        <div id="loading">Rotalar yukleniyor...</div>
        <div id="map"></div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
